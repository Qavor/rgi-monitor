name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package (no extras — zero deps)
      run: pip install -e .

    - name: Run built-in self-test
      run: python -m rgi_monitor.core

    - name: Install dev dependencies
      run: pip install pytest pytest-cov

    - name: Run pytest
      run: pytest tests/ -v --tb=short --cov=rgi_monitor --cov-report=term-missing

    - name: Run examples (stdlib only)
      run: |
        python examples/quickstart.py
        python examples/individual_probes.py

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - run: pip install ruff
    - run: ruff check rgi_monitor/

  selftest-cli:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - run: pip install -e .
    - run: rgi-monitor selftest
